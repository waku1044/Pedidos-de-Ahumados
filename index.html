<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke House | Pedidos</title>
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header">
            <h2 class="titulo">Ahumados</h2>
            <img src="./img/ahumadosCamapana.png" alt="logo" class="logo">
            <h2 class="titulo">Campana</h2>

        </div>
        <p>Sanguches Ahumados Artesanales</p>
        <h2>El auténtico sabor de la <span class="resaltar">leña</span> entre dos panes</h2>

    </header>

    <main class="container" id="menu-grid">
        <!-- Los productos se cargarán aquí con JS -->
    </main>

    <div id="cart-bar" class="cart-hidde">
        <div class="cart-info">
            <span id="cart-count">0</span> productos seleccionados
        </div>
        <button onclick="toggleModal()" class="btn-whatsapp">
            Pedir por WhatsApp
        </button>
    </div>
<!-- ... dentro del body, antes del script ... -->

<div id="cart-modal" class="modal-hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Tu Pedido</h2>
            <button onclick="toggleModal()" class="btn-close">&times;</button>
        </div>
        <div id="cart-items-list">
            <!-- Los items del resumen se cargan aquí -->
        </div>
        <div class="modal-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="modal-total">$0</span>
            </div>
            <div class="datos-cliente margen-bottom">
    <input
        type="text"
        id="cliente-nombre"
        placeholder="Nombre"
        required
    >

    <input
        type="text"
        id="cliente-direccion"
        placeholder="Dirección de entrega"
        required
    >

    <select id="cliente-pago">
        <option value="">Método de pago</option>
        <option>Efectivo</option>
        <option>Transferencia</option>
        
    </select>
    <textarea
    id="cliente-observaciones"
    placeholder="Observaciones (sin cebolla, retirar en local, etc.)">
</textarea>
</div>
            <button onclick="sendOrder()" class="btn-confirm">
                Confirmar y enviar a WhatsApp
            </button>
            <div class="botones">

                <button onclick="toggleModal()" class="btn-back">
                    + Agregar algo más
                </button>
                <button onclick="toggleModal()" class="btn-correguir">
                    - Eliminar Producto
                </button>
            </div>
        </div>
    </div>
</div>
<div id="modal-detalle" class="modal" onclick="cerrarModal(event)">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <img id="modal-img" src="" alt="">
        <div class="modal-info">
            <h2 id="modal-nombre"></h2>
            <p id="modal-descripcion"></p>
        </div>
    </div>
</div>
<footer>
    <div class="footer-content">
        <p>&copy; <span id="year"></span> Todos los derechos reservados.</p>
        <p>Desarrollado  por <a href="www.destinoweb.com.ar" target="_blank">Destino Web</a></p>
    </div>
</footer>

    <!-- Enlace al JS -->
    <script src="index.js"></script>
</body>
</html>
